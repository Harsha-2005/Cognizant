<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> Java Script Understanding</title>
</head>
<body>
<script>
    let count=0;
    let i=0;
    while(count<=25){
        if(i%2==0){
            document.write(i+"<br/>");
            count++;
        }
        i++;
    }
</script>

</body>
</html>

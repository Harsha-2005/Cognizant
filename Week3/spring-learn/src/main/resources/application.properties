logging.pattern.console=%d{yyMMdd}|%d{HH:mm:ss.SSS}|%-20.20thread|%5p|%-25.25logger{25}|%25M|%m%n

# Port configuration (optional, if port conflict happens as mentioned in troubleshooting)
server.port=8080

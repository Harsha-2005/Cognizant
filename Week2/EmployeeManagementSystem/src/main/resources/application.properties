# ─────────────────────────────────────────────────
# Exercise 1: H2 datasource config (as per the doc)
# ─────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ─────────────────────────────────────────────────
# Exercise 10: Hibernate dialect + performance props
# ─────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Exercise 10: Batch processing — Hibernate sends inserts in batches of 20
# so bulk saves don't fire N individual INSERTs to the DB
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.generate_statistics=true

# ─────────────────────────────────────────────────
# H2 console (handy in dev — http://localhost:8080/h2-console)
# ─────────────────────────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─────────────────────────────────────────────────
# Exercise 9: App name (Spring auto-config picks this up)
# ─────────────────────────────────────────────────
spring.application.name=EmployeeManagementSystem
server.port=8080

# Exercise 9: Spring Boot application properties
# H2 in-memory DB — wiped on every restart, perfect for demos

# H2 console (useful during development — access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# DataSource — H2 in-memory
spring.datasource.url=jdbc:h2:mem:librarydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# create-drop: creates tables on start, drops on shutdown — fine for dev/demo
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server port
server.port=8080

# Application name (shows up in logs and Spring Boot admin)
spring.application.name=LibraryManagement
